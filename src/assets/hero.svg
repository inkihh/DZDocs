<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" role="img" aria-label="DZDocs emblem">
  <defs>
    <style>
      .blue  { fill: none; stroke: #2f7fe6; stroke-linejoin: round; stroke-linecap: round; }
      .steel { fill: none; stroke: #7a8499; stroke-linejoin: round; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Faint instrument / topographic contours. -->
  <g class="steel" opacity="0.22">
    <circle cx="240" cy="240" r="212" stroke-width="1"/>
    <circle cx="240" cy="240" r="186" stroke-width="1" stroke-dasharray="3 9"/>
    <path stroke-width="1" d="M40 312 C 150 268, 330 268, 440 312"/>
    <path stroke-width="1" d="M60 168 C 150 198, 330 198, 420 168"/>
  </g>

  <!-- Corner instrument ticks. -->
  <g class="blue" opacity="0.5" stroke-width="2">
    <path d="M34 64 L34 34 L64 34"/>
    <path d="M446 64 L446 34 L416 34"/>
    <path d="M34 416 L34 446 L64 446"/>
    <path d="M446 416 L446 446 L416 446"/>
  </g>

  <!-- Soft blue baseline accent under the mark. -->
  <line class="blue" x1="96" y1="330" x2="384" y2="330" stroke-width="3" opacity="0.55"/>

  <!-- Brand mark, scaled up. -->
  <g transform="translate(80,154) scale(7.805)" fill="#f4f7fc">
    <polygon points="0,3 11,3 11,14"/>
    <polygon points="15,1 15,15 30,15"/>
    <polygon points="22,2 41,2 41,22"/>
  </g>
</svg>
